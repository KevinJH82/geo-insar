<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}geo-insar{% endblock %} - Deep-Explor InSAR</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #fafafa; }
    .sh-card { background: white; border: 1px solid #e4e4e7; border-radius: 0.5rem; box-shadow: 0 1px 3px 0 rgba(0,0,0,0.02); }
    .sh-input { border: 1px solid #e4e4e7; border-radius: 0.375rem; padding: 0.5rem 0.75rem; font-size: 0.875rem; width: 100%; transition: all 0.2s; }
    .sh-input:focus { outline: none; border-color: #2563eb; box-shadow: 0 0 0 3px #dbeafe; }
    .nav-item-active { background-color: #f4f4f5; color: #18181b; font-weight: 600; }
    .sh-btn-primary { background:#18181b; color:#fff; padding:0.5rem 1rem; border-radius:0.375rem; font-weight:500; display:inline-flex; align-items:center; gap:0.5rem; transition:opacity 0.2s; }
    .sh-btn-primary:hover { opacity:0.9; }
    .sh-btn-outline { background:#fff; border:1px solid #e5e7eb; color:#18181b; padding:0.5rem 1rem; border-radius:0.375rem; font-weight:500; display:inline-flex; align-items:center; gap:0.5rem; }
    .sh-btn-outline:hover { background:#f4f4f5; }
    .status-pill { display:inline-flex; align-items:center; gap:4px; padding:2px 8px; border-radius:9999px; font-size:11px; font-weight:500; }
    .pill-running { background:#fef3c7; color:#92400e; }
    .pill-done { background:#dcfce7; color:#166534; }
    .pill-error { background:#fee2e2; color:#991b1b; }
    .pill-pending { background:#e0e7ff; color:#3730a3; }
  </style>
</head>
<body class="min-h-screen">
<aside class="fixed left-0 top-0 h-screen w-64 border-r bg-white z-50">
  <div class="flex flex-col h-full">
    <div class="p-6">
      <div class="flex items-center gap-2 mb-8">
        <div class="bg-purple-600 text-white p-1.5 rounded-lg">
          <iconify-icon icon="lucide:radar" class="text-xl"></iconify-icon>
        </div>
        <span class="font-bold text-lg tracking-tight uppercase">Geo-InSAR</span>
      </div>
      <nav class="space-y-1">
        <a href="/index.html" class="flex items-center gap-3 px-3 py-2 rounded-md {% if active=='index' %}nav-item-active{% else %}text-zinc-500 hover:bg-zinc-100{% endif %} transition-colors">
          <iconify-icon icon="lucide:layers"></iconify-icon>
          <span class="text-sm">任务控制台</span>
        </a>
        <a href="/architecture.html" class="flex items-center gap-3 px-3 py-2 rounded-md {% if active=='architecture' %}nav-item-active{% else %}text-zinc-500 hover:bg-zinc-100{% endif %} transition-colors">
          <iconify-icon icon="lucide:database"></iconify-icon>
          <span class="text-sm">产品契约</span>
        </a>
        <a href="/delivery.html" class="flex items-center gap-3 px-3 py-2 rounded-md {% if active=='delivery' %}nav-item-active{% else %}text-zinc-500 hover:bg-zinc-100{% endif %} transition-colors">
          <iconify-icon icon="lucide:package-check"></iconify-icon>
          <span class="text-sm">交付整理</span>
        </a>
        <a href="/preflight.html" class="flex items-center gap-3 px-3 py-2 rounded-md {% if active=='preflight' %}nav-item-active{% else %}text-zinc-500 hover:bg-zinc-100{% endif %} transition-colors">
          <iconify-icon icon="lucide:stethoscope"></iconify-icon>
          <span class="text-sm">前置检查</span>
        </a>
      </nav>
    </div>
    <div class="mt-auto p-6 border-t">
      <div class="text-[10px] text-zinc-400">geo-insar v0.1.0-phase1<br>Port 8084</div>
    </div>
  </div>
</aside>

<main class="ml-64 p-8">
  <header class="flex items-center justify-between mb-8">
    <div>
      <h1 class="text-2xl font-bold text-zinc-900 tracking-tight">{% block page_title %}{% endblock %}</h1>
      <p class="text-zinc-500 text-sm mt-1">{% block page_sub %}{% endblock %}</p>
    </div>
    <div class="flex items-center gap-4">
      <a href="http://192.168.112.18/2nd%20Page/index.html" class="flex items-center gap-1.5 px-3 py-1.5 rounded-md text-sm text-zinc-600 hover:bg-zinc-100 hover:text-zinc-900 transition-colors" title="返回二级子系统登录页">
        <iconify-icon icon="lucide:arrow-left"></iconify-icon>
        <span>返回上一级</span>
      </a>
      <div id="hyp3-quota-chip"
           class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs font-medium bg-zinc-50 text-zinc-500 border-zinc-200 cursor-pointer hover:bg-zinc-100"
           title="点击强制刷新(默认 5 分钟缓存)">
        <iconify-icon icon="lucide:cloud" id="hyp3-quota-icon"></iconify-icon>
        <span id="hyp3-quota-text">HyP3 配额加载中…</span>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-purple-50 text-purple-700 rounded-full border border-purple-100 text-xs font-medium">
        <span class="w-2 h-2 rounded-full bg-purple-500 animate-pulse"></span>
        InSAR 系统就绪
      </div>
    </div>
  </header>
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
<script>
// HyP3 配额 chip:每页都自动加载,colored by remaining credits
(async function loadHyp3Quota(forceRefresh) {
  const chip = document.getElementById('hyp3-quota-chip');
  const text = document.getElementById('hyp3-quota-text');
  const icon = document.getElementById('hyp3-quota-icon');
  if (!chip) return;
  icon.setAttribute('icon', 'lucide:loader-2');
  icon.classList.add('animate-spin');
  text.textContent = 'HyP3 配额加载中…';
  try {
    const url = '/api/hyp3/quota' + (forceRefresh ? '?_=' + Date.now() : '');
    const r = await fetch(url);
    const j = await r.json();
    icon.classList.remove('animate-spin');
    icon.setAttribute('icon', 'lucide:cloud');
    if (j.error) {
      chip.className = 'flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs font-medium bg-zinc-50 text-zinc-500 border-zinc-200 cursor-pointer hover:bg-zinc-100';
      text.textContent = 'HyP3 配额: 查询失败';
      chip.title = j.error;
      return;
    }
    const credits = j.remaining_credits ?? 0;
    let color;
    if (credits < 100)        color = 'bg-red-50 text-red-700 border-red-200';
    else if (credits < 1000)  color = 'bg-amber-50 text-amber-700 border-amber-200';
    else                      color = 'bg-emerald-50 text-emerald-700 border-emerald-200';
    chip.className = 'flex items-center gap-1.5 px-3 py-1.5 rounded-full border text-xs font-medium cursor-pointer hover:opacity-80 ' + color;
    text.textContent = 'HyP3 剩余 ' + credits.toLocaleString();
    chip.title = `用户 ${j.user_id || '?'} · ${j.application_status || ''}`
                 + ` · ${j.cached ? '缓存 ' + j.age_seconds + 's 前' : '实时'}`
                 + ` · 点击强制刷新`;
  } catch (e) {
    icon.classList.remove('animate-spin');
    text.textContent = 'HyP3 配额: 错误';
    chip.title = e.message;
  }
})(false);
// 点击 chip 重载页面(服务端 5 分钟缓存自然到期会拿新值)
document.getElementById('hyp3-quota-chip')?.addEventListener('click', () => {
  location.reload();
});
</script>
</body>
</html>

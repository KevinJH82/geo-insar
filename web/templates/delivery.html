{% extends "_base.html" %}
{% set active = 'delivery' %}
{% block title %}交付整理{% endblock %}
{% block page_title %}交付整理{% endblock %}
{% block page_sub %}按"干涉对"维度查看堆栈,生成质量报告。{% endblock %}

{% block content %}
<section class="sh-card p-6">
  <h3 class="font-semibold text-zinc-900 flex items-center gap-2 mb-4">
    <iconify-icon icon="lucide:layers" class="text-purple-600"></iconify-icon>
    InSAR 堆栈(按 AOI)
  </h3>
  <div id="stacks-list" class="space-y-3 text-sm">加载中…</div>
</section>
{% endblock %}

{% block scripts %}
<script>
fetch('/api/stacks').then(r => r.json()).then(j => {
  const stacks = j.stacks || [];
  if (stacks.length === 0) {
    document.getElementById('stacks-list').innerHTML = '<div class="text-zinc-400">尚无完成的 InSAR 堆栈。提交任务并等 HyP3 处理完成。</div>';
    return;
  }
  document.getElementById('stacks-list').innerHTML = stacks.map(s => `
    <div class="border border-zinc-200 rounded-md p-4">
      <div class="flex justify-between items-center mb-2">
        <span class="font-medium">${s.aoi_name}</span>
        <span class="status-pill pill-done">${s.pair_count} 对</span>
      </div>
      <div class="text-xs text-zinc-500 space-y-1">
        <div>日期跨度: ${s.date_range?.[0]||'?'} ~ ${s.date_range?.[1]||'?'}</div>
        <div>极化: ${(s.polarizations||[]).join(', ')} · 轨道: ${(s.orbit_directions||[]).join(', ')}</div>
        <div>整体相干性均值: ${s.coherence_mean_overall != null ? s.coherence_mean_overall.toFixed(3) : '—'}</div>
        <div class="font-mono text-[11px] text-zinc-400">${s.aoi_path}</div>
      </div>
    </div>`).join('');
}).catch(e => {
  document.getElementById('stacks-list').innerHTML = `<span class="text-red-600">加载失败: ${e}</span>`;
});
</script>
{% endblock %}
